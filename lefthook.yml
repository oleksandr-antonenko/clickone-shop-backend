pre-commit:
  parallel: true
  commands:
    stylelint:
      run: npm run stylelint --fix {staged_files}
      glob: "*.css"
      stage_fixed: true

    eslint:
      run: npm run eslint --fix "{staged_files}"
      glob:
        - "*.ts"
        - "*.js"
        - "*.tsx"
        - "*.jsx"
      stage_fixed: true

    prettier:
      run: yarn run prettier --write "{staged_files}"
      glob:
        - "*.ts"
        - "*.js"
        - "*.tsx"
        - "*.jsx"
        - "*.json"
        - "*.css"
      stage_fixed: true