pre-commit:
  parallel: true
  commands:

    eslint:
      run: npm run eslint --fix "{staged_files}"
      glob:
        - "*.ts"
        - "*.js"
        - "*.tsx"
        - "*.jsx"
      stage_fixed: true

    prettier:
      run: yarn run prettier --write .
      glob:
        - "*.ts"
        - "*.js"
        - "*.tsx"
        - "*.jsx"
        - "*.json"
        - "*.css"
      stage_fixed: true